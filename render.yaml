services:
  - type: web
    name: nutter-xmd
    runtime: node
    region: oregon
    plan: free
    buildCommand: >
      pnpm install --no-frozen-lockfile &&
      BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/nutter-xmd run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is injected automatically by Render (no need to set it)
      #
      # Set the following secrets in the Render dashboard under Environment:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_DATABASE_URL
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false
